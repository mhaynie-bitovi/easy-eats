apiVersion: temporal.io/v1alpha1
kind: TemporalWorkerDeployment
metadata:
  name: valet-worker
  namespace: default
spec:
  temporalConnection:
    name: cluster-default
  temporalNamespace: default
  rolloutStrategy:
    type: AllAtOnce
  replicas: 1
  template:
    spec:
      containers:
        - name: valet-worker
          image: valet-worker:latest
          imagePullPolicy: IfNotPresent
