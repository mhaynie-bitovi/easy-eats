apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-dev-server
  namespace: temporal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-dev-server
  template:
    metadata:
      labels:
        app: temporal-dev-server
    spec:
      containers:
      - name: temporal
        image: temporalio/temporal:latest
        command:
          - temporal
          - server
          - start-dev
          - --ip
          - "0.0.0.0"
          - --log-format
          - pretty
        ports:
        - containerPort: 7233
          name: frontend
        - containerPort: 8233
          name: web-ui
        readinessProbe:
          tcpSocket:
            port: 7233
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-frontend
  namespace: temporal
spec:
  selector:
    app: temporal-dev-server
  ports:
  - port: 7233
    targetPort: 7233
    name: frontend
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-web
  namespace: temporal
spec:
  selector:
    app: temporal-dev-server
  ports:
  - port: 8080
    targetPort: 8233
    name: web-ui
